name: 🚀 Job Scraper Alert

on:
  schedule:
    # Run every 4 hours
    - cron: '0 */4 * * *'
  # Allow manual triggering from GitHub UI
  workflow_dispatch:

jobs:
  scrape-and-notify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🔍 Run job scraper
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python main.py

      - name: 💾 Commit database changes
        if: always()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Job Scraper Bot"
          if [ -f "jobs.db" ]; then
            git add jobs.db
            git commit -m "🤖 Update job database - $(date +'%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
            git push
          fi

      - name: 📊 Log workflow completion
        if: always()
        run: |
          echo "✅ Workflow completed at $(date +'%Y-%m-%d %H:%M:%S')"
